<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELLA CO. - Zara Inspired</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#fff;color:#111}
header{position:sticky;top:0;background:#fff;padding:20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between}
.hero{height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column}
.btn{background:#000;color:#fff;padding:12px 24px;border:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px}
.card{border:1px solid #eee;padding:15px}
img{width:100%;height:320px;object-fit:cover}
footer{padding:40px;text-align:center;border-top:1px solid #eee}
</style>
</head>
<body>
<header>
<div><b>VELLA CO.</b></div>
<div>Home | Shop | Collections | Contact</div>
</header>

<section class="hero">
<h1>Minimal Streetwear Collection</h1>
<p>Zara Inspired Premium Fashion Store</p>
<button class="btn">Shop Now</button>
</section>

<section class="grid">
<div class="card"><img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"><h3>Oversized Tee</h3><p>₹1499</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f"><h3>Premium Hoodie</h3><p>₹2499</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c"><h3>Jacket</h3><p>₹3999</p></div>
</section>

<footer>© 2026 VELLA CO.</footer>
</body>
</html>
