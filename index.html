<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELLA CO. - Premium Fashion Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f5f5f5;color:#111;}

/* HEADER */
header{
  position:sticky;top:0;z-index:1000;
  background:#131921;
  color:white;
  padding:10px 15px;
  display:flex;
  align-items:center;
  gap:10px;
}
.logo{font-weight:bold;font-size:18px;cursor:pointer;}
.search{
  flex:1;display:flex;
}
.search input{
  width:100%;padding:8px;border:none;border-radius:4px;
}
.cart{
  cursor:pointer;font-weight:bold;
}
.badge{
  background:orange;color:black;
  padding:2px 6px;border-radius:50%;
  font-size:12px;
}

/* CATEGORY BAR */
.categories{
  display:flex;gap:10px;
  background:#fff;
  padding:10px;
  overflow:auto;
}
.cat{
  padding:6px 10px;
  background:#eee;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

/* GRID */
.container{padding:15px;}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}
.card:hover{transform:scale(1.02);}
.card img{
  width:100%;height:180px;
  object-fit:cover;border-radius:8px;
}
.price{font-weight:bold;margin-top:5px;}
.rating{font-size:12px;color:#666;}
.btn{
  width:100%;
  padding:8px;
  margin-top:8px;
  border:none;
  background:#ff9f00;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* PRODUCT PAGE */
.page{display:none;}
.active{display:block;}

.product-box{
  background:#fff;padding:15px;border-radius:10px;
}
.product-box img{width:100%;border-radius:10px;}
select,input{
  width:100%;padding:8px;margin-top:8px;
}

/* CART */
.cart-item{
  display:flex;gap:10px;
  background:#fff;margin-bottom:10px;
  padding:10px;border-radius:10px;
}
.cart-item img{width:80px;height:80px;object-fit:cover;}

/* CHECKOUT */
.form input,textarea{
  width:100%;padding:10px;margin:8px 0;
}

/* TOAST */
.toast{
  position:fixed;bottom:20px;right:20px;
  background:black;color:white;
  padding:10px;border-radius:8px;
  display:none;
}

/* MOBILE */
@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="goHome()">VELLA CO.</div>

  <div class="search">
    <input type="text" placeholder="Search products..." onkeyup="search(this.value)">
  </div>

  <div class="cart" onclick="navigate('cart')">
    🛒 <span class="badge" id="cartCount">0</span>
  </div>
</header>

<div class="categories">
  <div class="cat" onclick="filterCat('all')">All</div>
  <div class="cat" onclick="filterCat('oversized')">Oversized</div>
  <div class="cat" onclick="filterCat('printed')">Printed</div>
  <div class="cat" onclick="filterCat('minimal')">Minimal</div>
  <div class="cat" onclick="filterCat('street')">Streetwear</div>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
  <h3>New Collection</h3>
  <div class="grid" id="grid"></div>

  <div style="text-align:center;margin-top:15px;">
    <button onclick="loadPage(1)">Page 1</button>
    <button onclick="loadPage(2)">Page 2</button>
  </div>
</div>

<!-- PRODUCT -->
<div id="product" class="page"></div>

<!-- CART -->
<div id="cart" class="page"></div>

<!-- CHECKOUT -->
<div id="checkout" class="page"></div>

</div>

<div class="toast" id="toast"></div>

<script>

/* PRODUCTS */
const products = [
{id:1,name:"Oversized Black Tee",price:799,img:"https://picsum.photos/300?1",rating:4.5,cat:"oversized"},
{id:2,name:"Minimal White Tee",price:699,img:"https://picsum.photos/300?2",rating:4.2,cat:"minimal"},
{id:3,name:"Graphic Street Tee",price:899,img:"https://picsum.photos/300?3",rating:4.6,cat:"printed"},
{id:4,name:"Luxury Logo Tee",price:999,img:"https://picsum.photos/300?4",rating:4.8,cat:"minimal"},
{id:5,name:"Urban Black Tee",price:749,img:"https://picsum.photos/300?5",rating:4.3,cat:"street"},
{id:6,name:"Classic Fit Tee",price:649,img:"https://picsum.photos/300?6",rating:4.0,cat:"minimal"},

{id:7,name:"Neon Print Tee",price:899,img:"https://picsum.photos/300?7",rating:4.4,cat:"printed"},
{id:8,name:"Premium Cotton Tee",price:1199,img:"https://picsum.photos/300?8",rating:4.9,cat:"minimal"},
{id:9,name:"Dark Street Tee",price:799,img:"https://picsum.photos/300?9",rating:4.2,cat:"street"},
{id:10,name:"Artist Graphic Tee",price:999,img:"https://picsum.photos/300?10",rating:4.7,cat:"printed"},
{id:11,name:"Mono Oversized Tee",price:699,img:"https://picsum.photos/300?11",rating:4.1,cat:"oversized"},
{id:12,name:"VELLA Signature Tee",price:1299,img:"https://picsum.photos/300?12",rating:5.0,cat:"minimal"},
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let currentFilter="all";

/* ROUTING */
function navigate(page,data=null){
  history.pushState({page,data},"",page);
  render(page,data);
}

window.onpopstate = e=>{
  if(e.state) render(e.state.page,e.state.data);
  else goHome();
};

function goHome(){
  navigate("home");
}

/* RENDER */
function render(page,data){
  hide();

  if(page==="home"){
    document.getElementById("home").classList.add("active");
    loadPage(1);
  }

  if(page==="product") showProduct(data);
  if(page==="cart") showCart();
  if(page==="checkout") showCheckout(data);

  updateCart();
}

function hide(){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
}

/* HOME */
function loadPage(page){
  let grid=document.getElementById("grid");
  grid.innerHTML="";

  let start=(page-1)*6;
  let end=start+6;

  products.slice(start,end).forEach(p=>{
    if(currentFilter==="all" || p.cat===currentFilter){
      grid.innerHTML+=card(p);
    }
  });
}

function card(p){
  return `
  <div class="card" onclick="openProduct(${p.id})">
    <img src="${p.img}">
    <h4>${p.name}</h4>
    <div class="rating">⭐ ${p.rating}</div>
    <div class="price">₹${p.price}</div>
    <button class="btn" onclick="event.stopPropagation();add(${p.id})">Add to Cart</button>
  </div>`;
}

/* PRODUCT */
function openProduct(id){
  let p=products.find(x=>x.id===id);
  navigate("product",p);
}

function showProduct(p){
  let div=document.getElementById("product");
  div.classList.add("active");

  div.innerHTML=`
  <div class="product-box">
    <img src="${p.img}">
    <h2>${p.name}</h2>
    <h3>₹${p.price}</h3>

    <label>Size</label>
    <select id="size">
      <option>S</option><option>M</option><option>L</option><option>XL</option>
    </select>

    <label>Qty</label>
    <input id="qty" type="number" value="1">

    <button class="btn" onclick="add(${p.id})">Add to Cart</button>
    <button class="btn" onclick="buyNow(${p.id})">Buy Now</button>
  </div>`;
}

/* CART */
function add(id){
  let p=products.find(x=>x.id===id);
  let size=document.getElementById("size")?.value||"M";
  let qty=parseInt(document.getElementById("qty")?.value||1);

  cart.push({...p,size,qty});
  localStorage.setItem("cart",JSON.stringify(cart));
  toast("Added to cart");
  updateCart();
}

function showCart(){
  let div=document.getElementById("cart");
  div.classList.add("active");

  let total=0;
  div.innerHTML="<h2>Your Cart</h2>";

  cart.forEach((c,i)=>{
    total+=c.price*c.qty;
    div.innerHTML+=`
    <div class="cart-item">
      <img src="${c.img}">
      <div>
        <h4>${c.name}</h4>
        <p>Size:${c.size}</p>
        <p>Qty:${c.qty}</p>
        <p>₹${c.price*c.qty}</p>
      </div>
    </div>`;
  });

  div.innerHTML+=`
  <h3>Total ₹${total}</h3>
  <button class="btn" onclick="navigate('checkout')">Checkout</button>`;
}

/* CHECKOUT */
function showCheckout(){
  let div=document.getElementById("checkout");
  div.classList.add("active");

  div.innerHTML=`
  <h2>Checkout</h2>

  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="phone" placeholder="Phone (10 digits)">
  <textarea id="address" placeholder="Address"></textarea>

  <button class="btn" onclick="razorpay()">Pay Online</button>
  <button class="btn" onclick="cod()">Cash on Delivery</button>
  <button class="btn" onclick="whatsapp()">WhatsApp Order</button>
  `;
}

/* PAYMENT */
function razorpay(){
  alert("Razorpay Key: YOUR_RAZORPAY_KEY");
  toast("Payment Success (Demo)");
}

/* COD + WHATSAPP */
function cod(){ sendWA(); }
function whatsapp(){ sendWA(); }

function sendWA(){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;

  if(phone.length!=10){
    alert("Invalid phone number");
    return;
  }

  let msg=`Hello VELLA CO,
Name:${name}
Phone:${phone}
Address:${address}
Order: Clothing
Total Items:${cart.length}`;

  window.open("https://wa.me/91XXXXXXXXXX?text="+encodeURIComponent(msg));
}

/* BUY NOW */
function buyNow(id){
  cart=[products.find(x=>x.id===id)];
  navigate("checkout");
}

/* FILTER */
function filterCat(c){currentFilter=c;loadPage(1);}

/* SEARCH */
function search(v){
  let g=document.getElementById("grid");
  g.innerHTML="";
  products.filter(p=>p.name.toLowerCase().includes(v.toLowerCase()))
  .forEach(p=>g.innerHTML+=card(p));
}

/* CART COUNT */
function updateCart(){
  document.getElementById("cartCount").innerText=cart.length;
}

/* TOAST */
function toast(m){
  let t=document.getElementById("toast");
  t.innerText=m;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

/* INIT */
render("home");

</script>

</body>
</html>
