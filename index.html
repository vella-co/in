<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VELLA CO.</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#111111;
      --muted:#666666;
      --line:#eaeaea;
      --soft:#f7f7f7;
      --accent:#111111;
      --green:#1a8f3c;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    body{overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    button,input,textarea,select{font:inherit}
    img{max-width:100%;display:block}
    .topbar{
      position:sticky;top:0;z-index:1000;background:#fff;border-bottom:1px solid var(--line);
    }
    .nav{
      max-width:1200px;margin:auto;display:flex;align-items:center;gap:12px;padding:12px 16px;
    }
    .brand{font-size:20px;font-weight:900;letter-spacing:.12em;cursor:pointer;white-space:nowrap}
    .hamburger{
      display:none;width:44px;height:44px;border:1px solid var(--line);background:#fff;border-radius:12px;cursor:pointer;
    }
    .search{
      flex:1;display:flex;align-items:center;border:1px solid var(--line);background:var(--soft);border-radius:999px;overflow:hidden;
    }
    .search input{
      flex:1;border:0;outline:none;background:transparent;padding:13px 16px;
    }
    .search button{
      border:0;background:#111;color:#fff;padding:13px 18px;cursor:pointer;
    }
    .cart-btn{
      position:relative;border:1px solid var(--line);background:#fff;border-radius:999px;padding:12px 16px;cursor:pointer;
      display:flex;align-items:center;gap:8px;font-weight:700;
    }
    .badge{
      position:absolute;top:-7px;right:-7px;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:#111;color:#fff;
      display:grid;place-items:center;font-size:12px;
    }
    .mobile-menu{
      display:none;max-width:1200px;margin:auto;padding:0 16px 14px;
    }
    .mobile-menu.open{display:block}
    .container{max-width:1200px;margin:auto;padding:18px 16px 40px}
    .page{display:none;animation:fade .18s ease}
    .page.active{display:block}
    @keyframes fade{from{opacity:.4;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .hero{
      display:grid;grid-template-columns:1.3fr .7fr;gap:18px;margin:18px 0 22px;
    }
    .hero-main{
      background:linear-gradient(135deg,#111,#444);color:#fff;border-radius:24px;padding:28px;box-shadow:var(--shadow);min-height:240px;
      display:flex;flex-direction:column;justify-content:space-between;
    }
    .hero-main h1{margin:0;font-size:clamp(28px,4vw,52px);line-height:1.02}
    .hero-main p{max-width:560px;color:#f0f0f0;line-height:1.7}
    .hero-side{display:grid;gap:18px}
    .mini{
      background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)
    }
    .filters{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0 18px}
    .chip{
      border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;cursor:pointer;
    }
    .chip.active{background:#111;color:#fff;border-color:#111}
    .grid{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;
    }
    .card{
      border:1px solid var(--line);border-radius:22px;overflow:hidden;background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.04);
      transition:.18s transform,.18s box-shadow;
    }
    .card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
    .imgwrap{aspect-ratio:1/1;background:#f5f5f5;overflow:hidden}
    .imgwrap img{width:100%;height:100%;object-fit:cover}
    .card-body{padding:16px;display:flex;flex-direction:column;gap:10px}
    .title{font-size:16px;font-weight:800;line-height:1.35}
    .muted{color:var(--muted);font-size:14px}
    .price{font-size:20px;font-weight:900}
    .rating{font-size:14px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:0;border-radius:14px;padding:12px 14px;cursor:pointer;font-weight:800;
    }
    .btn.primary{background:#111;color:#fff}
    .btn.soft{background:#f2f2f2;color:#111}
    .btn.success{background:var(--green);color:#fff}
    .btn.block{width:100%}
    .pager{display:flex;justify-content:center;gap:10px;margin-top:22px;flex-wrap:wrap}
    .pager button{
      border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;cursor:pointer
    }
    .pager button.active{background:#111;color:#fff;border-color:#111}
    .detail{
      display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;
    }
    .panel{
      border:1px solid var(--line);border-radius:24px;background:#fff;box-shadow:var(--shadow);overflow:hidden;
    }
    .detail-img{aspect-ratio:1/1;background:#f5f5f5}
    .detail-img img{width:100%;height:100%;object-fit:cover}
    .content{padding:20px}
    .opts{display:flex;gap:10px;flex-wrap:wrap}
    .opt{
      border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;cursor:pointer
    }
    .opt.active{background:#111;color:#fff;border-color:#111}
    .qty{
      display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:12px;overflow:hidden;
    }
    .qty button{width:40px;height:40px;border:0;background:#f7f7f7;cursor:pointer}
    .qty input{width:50px;text-align:center;border:0;outline:none}
