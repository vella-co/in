<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELLA CO.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fff;
color:#111;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

header{
position:sticky;
top:0;
z-index:9999;
background:#fff;
box-shadow:0 2px 15px rgba(0,0,0,.08);
}

.topbar{
height:75px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
}

.logo{
height:55px;
}

.menu-btn{
font-size:28px;
cursor:pointer;
}

.right-icons{
display:flex;
gap:15px;
font-size:24px;
}

.cart-count{
position:absolute;
top:-5px;
right:-8px;
background:red;
color:#fff;
width:18px;
height:18px;
border-radius:50%;
font-size:11px;
display:flex;
align-items:center;
justify-content:center;
}

.cart-wrap{
position:relative;
}

.search-wrap{
padding:10px 15px 15px;
background:#fff;
}

.search-box{
width:100%;
height:48px;
border:1px solid #ddd;
border-radius:50px;
padding:0 20px;
font-size:15px;
outline:none;
}

.mobile-menu{
position:fixed;
left:-100%;
top:0;
width:280px;
height:100vh;
background:#fff;
box-shadow:0 0 25px rgba(0,0,0,.15);
transition:.4s;
z-index:99999;
padding:20px;
}

.mobile-menu.active{
left:0;
}

.close-menu{
font-size:30px;
cursor:pointer;
margin-bottom:20px;
}

.mobile-menu a{
display:block;
padding:14px 0;
border-bottom:1px solid #eee;
font-size:15px;
font-weight:500;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:9999;
}

.overlay.active{
display:block;
}

.hero{
height:520px;
background:url('https://images.unsplash.com/photo-1523398002811-999ca8dec234?q=80&w=1200') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content{
background:rgba(255,255,255,.9);
padding:30px;
border-radius:15px;
max-width:500px;
}

.hero-content h1{
font-size:40px;
margin-bottom:10px;
}

.hero-content p{
font-size:15px;
margin-bottom:20px;
}

.shop-btn{
display:inline-block;
background:#000;
color:#fff;
padding:12px 30px;
border-radius:50px;
}

.section-title{
text-align:center;
font-size:28px;
font-weight:700;
margin:50px 0 25px;
}

.products{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

@media(min-width:768px){

.products{
grid-template-columns:repeat(4,1fr);
}

.hero-content h1{
font-size:55px;
}

}

</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<div class="mobile-menu" id="mobileMenu">

<div class="close-menu" onclick="closeMenu()">
✕
</div>

<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">New Arrivals</a>
<a href="#">Best Sellers</a>
<a href="#">Track Order</a>
<a href="#">Contact Us</a>
<a href="#">About Us</a>

</div>

<header>

<div class="topbar">

<div class="menu-btn" onclick="openMenu()">
☰
</div>

<img src="logo.png" class="logo">

<div class="right-icons">

<div>❤</div>

<div class="cart-wrap">
🛒
<div class="cart-count">
0
</div>
</div>

</div>

</div>

<div class="search-wrap">

<input
type="text"
class="search-box"
placeholder="Search Products..."
>

</div>

</header>

<section class="hero">

<div class="hero-content">

<h1>VELLA CO.</h1>

<p>
Premium Fashion Collection
For Modern Streetwear Lovers
</p>

<a href="#" class="shop-btn">
SHOP NOW
</a>

</div>

</section>

<h2 class="section-title">
Featured Products
</h2>
