<!-- =========================
VELLA CO. PREMIUM STORE
SAVE AS : index.html
========================= -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vella Co.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
GLOBAL
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#070707;
color:white;
overflow-x:hidden;
}

/* =========================
HEADER
========================= */

header{
width:100%;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:700;
letter-spacing:2px;
}

.right-icons{
display:flex;
align-items:center;
gap:20px;
}

.icon{
font-size:25px;
cursor:pointer;
position:relative;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:#00ff99;
color:black;
font-size:12px;
padding:2px 7px;
border-radius:50%;
font-weight:700;
}

/* =========================
SEARCH
========================= */

.search-box{
padding:20px;
}

.search-box input{
width:100%;
padding:17px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(10px);
color:white;
font-size:16px;
}

/* =========================
HOME PAGE
========================= */

#homePage{
display:block;
}

.products{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:25px;
overflow:hidden;
cursor:pointer;
transition:0.4s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-info{
padding:15px;
}

.card-title{
font-size:17px;
font-weight:600;
margin-bottom:8px;
}

.price{
font-size:24px;
font-weight:700;
color:#00ff99;
margin-bottom:10px;
}

.small-btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
}

/* =========================
PRODUCT PAGE
========================= */

#productPage{
display:none;
padding-bottom:100px;
}

.back-btn{
margin:20px;
font-size:18px;
cursor:pointer;
display:inline-block;
}

.product-image{
width:100%;
height:450px;
object-fit:cover;
}

.product-details{
padding:25px;
}

.product-title{
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.product-price{
font-size:35px;
font-weight:700;
color:#00ff99;
margin-bottom:20px;
}

.desc{
line-height:1.7;
color:#ccc;
margin-bottom:25px;
}

.sizes{
display:flex;
gap:10px;
margin-bottom:25px;
flex-wrap:wrap;
}

.size{
padding:12px 18px;
border:1px solid rgba(255,255,255,0.2);
border-radius:12px;
cursor:pointer;
}

.action-buttons{
display:flex;
gap:15px;
}

.action-buttons button{
flex:1;
padding:16px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.cart-btn{
background:white;
color:black;
}

.buy-btn{
background:#00ff99;
color:black;
}

/* =========================
CART
========================= */

#cartPage{
display:none;
padding:20px;
padding-bottom:120px;
}

.cart-item{
display:flex;
gap:15px;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:20px;
margin-bottom:20px;
}

.cart-item img{
width:90px;
height:90px;
border-radius:15px;
object-fit:cover;
}

.cart-info h3{
margin-bottom:8px;
}

.total-box{
margin-top:25px;
font-size:25px;
font-weight:700;
}

.checkout-btn{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:15px;
background:#00ff99;
color:black;
font-size:18px;
font-weight:700;
cursor:pointer;
}

/* =========================
FORM
========================= */

#checkoutForm{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000ee;
z-index:5000;
overflow:auto;
padding:20px;
}

.form-box{
max-width:500px;
margin:auto;
background:#121212;
padding:25px;
border-radius:25px;
margin-top:40px;
}

.form-box h2{
margin-bottom:20px;
}

.form-box input,
.form-box textarea,
.form-box select{
width:100%;
padding:16px;
margin-top:15px;
background:#1f1f1f;
border:none;
border-radius:12px;
color:white;
}

.form-box button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:12px;
background:#00ff99;
font-size:18px;
font-weight:700;
cursor:pointer;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:600px){

.card img{
height:240px;
}

.product-image{
height:380px;
}

.action-buttons{
flex-direction:column;
}

}

</style>

</head>

<body>

<!-- =========================
HEADER
========================= -->

<header>

<div class="logo">VELLA CO.</div>

<div class="right-icons">

<div class="icon" onclick="openCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>

</div>

</header>

<!-- =========================
HOME PAGE
========================= -->

<div id="homePage">

<div class="search-box">

<input 
type="text" 
placeholder="Search Products..." 
id="searchInput"
onkeyup="searchProducts()"
>

</div>

<div class="products" id="productsContainer"></div>

</div>

<!-- =========================
PRODUCT PAGE
========================= -->

<div id="productPage">

<div class="back-btn" onclick="goBack()">
⬅ Back
</div>

<img id="productImage" class="product-image">

<div class="product-details">

<div class="product-title" id="productTitle"></div>

<div class="product-price" id="productPrice"></div>

<div class="desc">
Premium quality oversized t-shirt with stylish modern fit.
Soft fabric and premium comfort for daily wear.
</div>

<h3>Select Size</h3>

<div class="sizes">

<div class="size">S</div>
<div class="size">M</div>
<div class="size">L</div>
<div class="size">XL</div>

</div>

<div class="action-buttons">

<button class="cart-btn" onclick="addCurrentToCart()">
Add To Cart
</button>

<button class="buy-btn" onclick="buyNow()">
Buy Now
</button>

</div>

</div>

</div>

<!-- =========================
CART PAGE
========================= -->

<div id="cartPage">

<div class="back-btn" onclick="goBack()">
⬅ Back
</div>

<h2>Your Cart</h2>

<br>

<div id="cartItems"></div>

<div class="total-box">
Total : ₹<span id="totalPrice">0</span>
</div>

<button class="checkout-btn" onclick="openCheckout()">
Proceed To Checkout
</button>

</div>

<!-- =========================
CHECKOUT FORM
========================= -->

<div id="checkoutForm">

<div class="form-box">

<h2>Checkout Details</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="number" id="mobile" placeholder="Mobile Number">

<textarea id="address" placeholder="Full Address"></textarea>

<select id="gender">

<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

<select id="state">

<option>Uttar Pradesh</option>
<option>Delhi</option>
<option>Maharashtra</option>
<option>Bihar</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Haryana</option>
<option>Gujarat</option>
<option>Madhya Pradesh</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>

</select>

<button onclick="sendOrder()">
Place Order On WhatsApp
</button>

</div>

</div>

<script>

/* =========================
PRODUCTS
========================= */

const products=[

{
id:1,
name:"White Printed T-Shirt",
price:1234,
image:"images/shirt1.jpg"
},

{
id:2,
name:"Olive Polo T-Shirt",
price:999,
image:"images/shirt2.jpg"
},

{
id:3,
name:"Black Premium Polo",
price:1799,
image:"images/shirt3.jpg"
},

{
id:4,
name:"Blue Stripe Shirt",
price:1499,
image:"images/shirt4.jpg"
}

];

/* =========================
SHOW PRODUCTS
========================= */

const productsContainer=document.getElementById("productsContainer");

function displayProducts(list){

productsContainer.innerHTML="";

list.forEach(product=>{

productsContainer.innerHTML+=`

<div class="card" onclick="openProduct(${product.id})">

<img src="${product.image}">

<div class="card-info">

<div class="card-title">
${product.name}
</div>

<div class="price">
₹${product.price}
</div>

<button class="small-btn">
View Product
</button>

</div>

</div>

`;

});

}

displayProducts(products);

/* =========================
SEARCH
========================= */

function searchProducts(){

let input=document
.getElementById("searchInput")
.value
.toLowerCase();

let filtered=products.filter(product=>

product.name.toLowerCase().includes(input)

);

displayProducts(filtered);

}

/* =========================
PAGES
========================= */

const homePage=document.getElementById("homePage");
const productPage=document.getElementById("productPage");
const cartPage=document.getElementById("cartPage");

let currentProduct=null;

/* =========================
OPEN PRODUCT
========================= */

function openProduct(id){

let product=products.find(p=>p.id===id);

currentProduct=product;

document.getElementById("productImage").src=product.image;
document.getElementById("productTitle").innerText=product.name;
document.getElementById("productPrice").innerText="₹"+product.price;

homePage.style.display="none";
cartPage.style.display="none";
productPage.style.display="block";

/* HISTORY */

history.pushState(
{page:"product"},
"",
"#product"
);

}

/* =========================
BACK SYSTEM
========================= */

function goBack(){

history.back();

}

window.onpopstate=function(){

if(location.hash=="#product"){

productPage.style.display="block";
homePage.style.display="none";
cartPage.style.display="none";

}else if(location.hash=="#cart"){

cartPage.style.display="block";
homePage.style.display="none";
productPage.style.display="none";

}else{

homePage.style.display="block";
productPage.style.display="none";
cartPage.style.display="none";

}

};

/* =========================
CART
========================= */

let cart=[];

function addCurrentToCart(){

cart.push(currentProduct);

updateCart();

alert("Added To Cart");

}

function openCart(){

homePage.style.display="none";
productPage.style.display="none";
cartPage.style.display="block";

history.pushState(
{page:"cart"},
"",
"#cart"
);

}

function updateCart(){

let cartItems=document.getElementById("cartItems");

cartItems.innerHTML="";

let total=0;

cart.forEach(item=>{

total += item.price;

cartItems.innerHTML += `

<div class="cart-item">

<img src="${item.image}">

<div class="cart-info">

<h3>${item.name}</h3>

<p>₹${item.price}</p>

</div>

</div>

`;

});

document.getElementById("totalPrice").innerText=total;

document.getElementById("cartCount").innerText=cart.length;

}

/* =========================
BUY NOW
========================= */

function buyNow(){

cart=[currentProduct];

updateCart();

openCheckout();

}

/* =========================
CHECKOUT
========================= */

function openCheckout(){

document.getElementById("checkoutForm").style.display="block";

}

/* =========================
WHATSAPP ORDER
========================= */

function sendOrder(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let address=document.getElementById("address").value;
let gender=document.getElementById("gender").value;
let state=document.getElementById("state").value;

let items="";

cart.forEach(item=>{

items += item.name + " - ₹" + item.price + "%0A";

});

let total=document.getElementById("totalPrice").innerText;

/* APNA NUMBER YAHA DALO */

let phone="919999999999";

let message=

"🛒 *NEW ORDER* %0A%0A"+

"👤 Name: "+name+"%0A"+
"📱 Mobile: "+mobile+"%0A"+
"🏠 Address: "+address+"%0A"+
"⚧ Gender: "+gender+"%0A"+
"📍 State: "+state+"%0A%0A"+

"🛍 Products:%0A"+items+

"%0A💰 Total: ₹"+total;

window.open(

"https://wa.me/"+phone+"?text="+message,

"_blank"

);

}

</script>

</body>
</html>
