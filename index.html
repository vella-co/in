<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VELLA CO. - Luxury Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
/* =====================
GLOBAL STYLE
===================== */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{
  background:#0a0a0a;
  color:#fff;
  overflow-x:hidden;
}

/* GOLD ACCENT */
:root{
  --gold:#d4af37;
  --glass:rgba(255,255,255,0.06);
}

/* =====================
NAVBAR
===================== */
nav{
  position:sticky;
  top:0;
  backdrop-filter: blur(15px);
  background:rgba(0,0,0,0.4);
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  z-index:1000;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
  font-family:'Playfair Display';
  font-size:22px;
  color:var(--gold);
}

.nav-links a{
  color:#fff;
  margin:0 10px;
  text-decoration:none;
  font-size:14px;
}

.cart-btn{
  background:var(--gold);
  color:#000;
  padding:6px 12px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

/* =====================
HERO
===================== */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background: radial-gradient(circle, #1a1a1a, #000);
}

.hero h1{
  font-size:60px;
  font-family:'Playfair Display';
  color:var(--gold);
}

.hero p{margin:10px 0 20px;color:#ccc;}

.btn{
  padding:10px 20px;
  border:none;
  cursor:pointer;
  margin:5px;
  border-radius:8px;
}

.btn-gold{
  background:var(--gold);
  color:#000;
}

.btn-outline{
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold);
}

/* =====================
SECTIONS
===================== */
section{padding:60px 20px;}

/* CATEGORIES */
.grid-4{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}

.card{
  background:var(--glass);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  border:1px solid var(--gold);
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.product{
  background:var(--glass);
  border-radius:15px;
  padding:15px;
  transition:0.3s;
}

.product:hover{transform:translateY(-5px);}

.product img{
  width:100%;
  border-radius:10px;
}

.price{color:var(--gold);margin:5px 0;}

/* FILTER BAR */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

select,input{
  padding:8px;
  border-radius:6px;
  border:none;
}

/* CART */
.cart-drawer{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.4s;
  overflow-y:auto;
  z-index:2000;
}

.cart-drawer.active{right:0;}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  border-bottom:1px solid #333;
  padding-bottom:10px;
}

/* CHECKOUT */
.checkout{
  display:none;
  padding:20px;
  background:#111;
}

input, textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1{font-size:35px;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">VELLA CO.</div>
  <div class="nav-links">
    <a href="#home">Home</a>
    <a href="#shop">Shop</a>
    <a href="#" onclick="toggleCart()">Cart 🛒</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  <h1>VELLA CO.</h1>
  <p>Wear Your Attitude</p>
  <button class="btn btn-gold">Shop Now</button>
  <button class="btn btn-outline">Explore</button>
</div>

<!-- CATEGORIES -->
<section>
<h2>Categories</h2>
<div class="grid-4">
  <div class="card">T-Shirts</div>
  <div class="card">Hoodies</div>
  <div class="card">Jeans</div>
  <div class="card">Streetwear</div>
</div>
</section>

<!-- SHOP -->
<section id="shop">
<h2>Trending Products</h2>

<div class="filters">
  <select id="categoryFilter" onchange="filterProducts()">
    <option value="all">All</option>
    <option value="tshirt">T-Shirts</option>
    <option value="hoodie">Hoodies</option>
  </select>

  <select id="sortFilter" onchange="filterProducts()">
    <option value="default">Sort</option>
    <option value="low">Low to High</option>
    <option value="high">High to Low</option>
  </select>
</div>

<div class="products" id="productList"></div>
</section>

<!-- CART -->
<div class="cart-drawer" id="cartDrawer">
  <h2>Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button class="btn btn-gold" onclick="openCheckout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
<h2>Checkout</h2>
<input placeholder="Name" id="name">
<input placeholder="Phone" id="phone">
<textarea placeholder="Address" id="address"></textarea>

<h3>Payment Method</h3>
<select id="paymentMethod">
  <option>COD</option>
  <option>Online (Razorpay)</option>
</select>

<button class="btn btn-gold" onclick="processPaymentWithRazorpay()">Pay Now</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="mName"></h3>
    <p id="mPrice"></p>
    <button class="btn btn-gold" onclick="addToCart()">Add to Cart</button>
  </div>
</div>

<script>
let products = [
  {id:1,name:"Black Street Tee",price:799,cat:"tshirt"},
  {id:2,name:"Luxury Hoodie",price:1299,cat:"hoodie"},
  {id:3,name:"Oversized Tee",price:699,cat:"tshirt"},
  {id:4,name:"Premium Hoodie",price:1499,cat:"hoodie"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let selectedProduct=null;

/* RENDER */
function renderProducts(list=products){
  let html="";
  list.forEach(p=>{
    html+=`
    <div class="product">
      <img src="https://via.placeholder.com/200">
      <h4>${p.name}</h4>
      <div class="price">₹${p.price}</div>
      <button class="btn btn-gold" onclick="openModal(${p.id})">Quick View</button>
    </div>`;
  });
  document.getElementById("productList").innerHTML=html;
}
renderProducts();

/* FILTER */
function filterProducts(){
  let cat=document.getElementById("categoryFilter").value;
  let sort=document.getElementById("sortFilter").value;

  let filtered=[...products];

  if(cat!="all") filtered=filtered.filter(p=>p.cat==cat);

  if(sort=="low") filtered.sort((a,b)=>a.price-b.price);
  if(sort=="high") filtered.sort((a,b)=>b.price-a.price);

  renderProducts(filtered);
}

/* MODAL */
function openModal(id){
  selectedProduct=products.find(p=>p.id==id);
  document.getElementById("mName").innerText=selectedProduct.name;
  document.getElementById("mPrice").innerText="₹"+selectedProduct.price;
  document.getElementById("modal").style.display="flex";
}

function addToCart(){
  cart.push(selectedProduct);
  localStorage.setItem("cart",JSON.stringify(cart));
  alert("Added to Cart");
  document.getElementById("modal").style.display="none";
  updateCart();
}

/* CART */
function toggleCart(){
  document.getElementById("cartDrawer").classList.toggle("active");
  updateCart();
}

function updateCart(){
  let html="";
  let total=0;

  cart.forEach((item,i)=>{
    total+=item.price;
    html+=`
    <div class="cart-item">
      <span>${item.name}</span>
      <span>₹${item.price}</span>
    </div>`;
  });

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
}

/* CHECKOUT */
function openCheckout(){
  document.getElementById("checkout").style.display="block";
}

/* RAZORPAY SIMULATION */
function processPaymentWithRazorpay(){
  let method=document.getElementById("paymentMethod").value;

  if(method=="COD"){
    alert("Order Placed (COD)");
  }else{
    setTimeout(()=>{
      alert("Payment Successful 🎉 Order Confirmed");
    },2000);
  }

  cart=[];
  localStorage.removeItem("cart");
  updateCart();
}
</script>

</body>
</html>
