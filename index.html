<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vella Co. Clothing Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #111;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #f5c542;
        }
        nav {
            cursor: pointer;
        }
        .search-cart {
            display: flex;
            align-items: center;
        }
        input[type="text"] {
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 200px;
        }
        .cart {
            margin-left: 20px;
            cursor: pointer;
        }
        .banner {
            background: #333;
            text-align: center;
            padding: 60px 20px;
            margin: 20px 0;
            font-size: 28px;
            background: linear-gradient(to right, #000, #444);
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
        }
        .product-card {
            background: #111;
            border: 1px solid #f5c542;
            border-radius: 15px;
            padding: 15px;
            width: 250px;
            text-align: center;
        }
        .product-card img {
            width: 100%;
            border-radius: 10px;
        }
        .product-card h3 {
            margin: 10px 0 5px 0;
        }
        .product-card p {
            margin: 5px 0;
            color: #f5c542;
            font-size: 18px;
        }
        footer {
            background: #111;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            color: #aaa;
        }
        /* Product detail page styling */
        .product-detail {
            padding: 40px;
            text-align: center;
        }
        .product-detail img {
            width: 300px;
            border-radius: 15px;
        }
        .product-detail h2 {
            margin: 20px 0 10px 0;
        }
        .product-detail p {
            color: #f5c542;
            font-size: 22px;
        }
        .similar-products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Vella Co.</div>
        <nav id="menu">Menu</nav>
        <div class="search-cart">
            <input type="text" placeholder="Search products...">
            <div class="cart">Cart (0)</div>
        </div>
    </header>
    <section class="banner">
        <h2>New Collection Launch</h2>
        <p>Check out our latest streetwear collection!</p>
    </section>

            </a>
        </div>

                <p>₹1199</p>
            </a>
        </div>

                <img src="images/product3.jpg" alt="Product 3">
                <h3>Minimal White Tee</h3>
                <p>₹899</p>
            </a>
        </div>
