<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Fashion Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #ffffff; color: #333; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; padding: 20px 10%; border-bottom: 1px solid #eee; }
        
        /* Hero Section */
        .hero { padding: 100px 10%; text-align: center; }
        .hero h1 { font-size: 3rem; margin-bottom: 20px; }
        
        /* Blue Button (Order Now) */
        .btn { 
            background-color: #007bff; color: white; padding: 15px 30px; 
            border: none; border-radius: 5px; cursor: pointer; font-size: 1rem;
            transition: 0.3s;
        }
        .btn:hover { background-color: #0056b3; }

        /* Product Grid */
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px 10%; }
        .card { border: 1px solid #f0f0f0; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav>
        <h2>MyStyle</h2>
        <div>Cart (0)</div>
    </nav>

    <div class="hero">
        <h1>Premium Collection 2026</h1>
        <p>Quality apparel for your lifestyle.</p>
    </div>

    <div class="products">
        <div class="card">
            <h3>Premium T-Shirt</h3>
            <p>₹999</p>
            <br>
            <button class="btn" onclick="orderNow('Premium T-Shirt', 999)">Order Now</button>
        </div>
        <!-- Aur products yahan add karein -->
    </div>

    <script>
        function orderNow(productName, price) {
            alert("Integrating Razorpay for: " + productName + " at ₹" + price);
            // Yahan aap Razorpay ki script call karenge
        }
    </script>
</body>
</html>
