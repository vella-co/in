<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sudheer Fashion</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

/* HEADER */

header{
width:100%;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-size:28px;
font-weight:700;
letter-spacing:2px;
color:white;
}

.icons{
display:flex;
gap:20px;
font-size:25px;
cursor:pointer;
}

.cart-count{
background:red;
padding:2px 8px;
border-radius:50%;
font-size:12px;
position:absolute;
margin-top:-10px;
margin-left:-8px;
}

/* SEARCH */

.search-box{
padding:20px;
}

.search-box input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
color:white;
font-size:16px;
}

/* PRODUCTS */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
overflow:hidden;
transition:0.4s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-size:17px;
font-weight:600;
margin-bottom:10px;
}

.price{
font-size:22px;
font-weight:700;
color:#00ff95;
margin-bottom:12px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
}

/* CART */

.cart-box{
position:fixed;
right:-100%;
top:0;
width:350px;
height:100%;
background:#111;
padding:20px;
overflow:auto;
transition:0.5s;
z-index:3000;
}

.cart-box.active{
right:0;
}

.cart-item{
display:flex;
gap:10px;
margin-bottom:20px;
background:#1a1a1a;
padding:10px;
border-radius:15px;
}

.cart-item img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.checkout-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
background:#00ff95;
color:black;
font-size:18px;
font-weight:bold;
border-radius:15px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000e8;
display:none;
justify-content:center;
align-items:center;
z-index:4000;
padding:20px;
overflow:auto;
}

.popup-content{
width:100%;
max-width:500px;
background:#151515;
border-radius:25px;
padding:25px;
}

.popup-content input,
.popup-content select,
.popup-content textarea{
width:100%;
padding:15px;
margin-top:15px;
background:#222;
border:none;
border-radius:12px;
color:white;
}

.popup-content button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
background:#00ff95;
font-size:18px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
}

.close{
float:right;
font-size:30px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:600px){

.logo{
font-size:22px;
}

.card img{
height:240px;
}

.cart-box{
width:100%;
}

}

</style>
</head>

<body>

<header>

<div class="logo">SUDHEER FASHION</div>

<div class="icons">

<div onclick="openCart()">
🛒
<span class="cart-count" id="count">0</span>
</div>

</div>

</header>

<!-- SEARCH -->

<div class="search-box">
<input type="text" id="search" placeholder="Search T-Shirts..." onkeyup="searchProduct()">
</div>

<!-- PRODUCTS -->

<div class="container" id="products">

</div>

<!-- CART -->

<div class="cart-box" id="cartBox">

<h2>Your Cart</h2>
<br>

<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="checkout-btn" onclick="openForm()">
Proceed To Checkout
</button>

</div>

<!-- FORM -->

<div class="popup" id="popup">

<div class="popup-content">

<div class="close" onclick="closeForm()">×</div>

<h2>Checkout Details</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="number" id="mobile" placeholder="Mobile Number">

<textarea id="address" placeholder="Full Address"></textarea>

<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<select id="state">

<option>Uttar Pradesh</option>
<option>Delhi</option>
<option>Maharashtra</option>
<option>Bihar</option>
<option>Rajasthan</option>
<option>Punjab</option>
<option>Haryana</option>
<option>Gujarat</option>
<option>Madhya Pradesh</option>
<option>West Bengal</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>
<option>Kerala</option>

</select>

<button onclick="sendWhatsApp()">
Place Order
</button>

</div>

</div>

<script>

/* PRODUCTS */

let products = [

{
name:"White Printed T-Shirt",
price:1234,
image:"images/shirt1.jpg"
},

{
name:"Olive Polo T-Shirt",
price:974,
image:"images/shirt2.jpg"
},

{
name:"Black Premium Polo",
price:1799,
image:"images/shirt3.jpg"
},

{
name:"Blue Stripe Shirt",
price:1499,
image:"images/shirt4.jpg"
}

];

/* SHOW PRODUCTS */

let productHTML="";

products.forEach((item,index)=>{

productHTML += `

<div class="card">

<img src="${item.image}">

<div class="info">

<div class="title">
${item.name}
</div>

<div class="price">
₹${item.price}
</div>

<button class="btn" onclick="addToCart(${index})">
Add To Cart
</button>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=productHTML;

/* SEARCH */

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach((card,index)=>{

let name=products[index].name.toLowerCase();

if(name.includes(input)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

/* CART */

let cart=[];

function addToCart(index){

cart.push(products[index]);

updateCart();

}

function updateCart(){

let cartHTML="";
let total=0;

cart.forEach(item=>{

total += item.price;

cartHTML += `

<div class="cart-item">

<img src="${item.image}">

<div>

<h4>${item.name}</h4>

<p>₹${item.price}</p>

</div>

</div>

`;

});

document.getElementById("cartItems").innerHTML=cartHTML;

document.getElementById("total").innerHTML=total;

document.getElementById("count").innerHTML=cart.length;

}

/* OPEN CART */

function openCart(){

document.getElementById("cartBox").classList.toggle("active");

}

/* FORM */

function openForm(){

document.getElementById("popup").style.display="flex";

}

function closeForm(){

document.getElementById("popup").style.display="none";

}

/* WHATSAPP */

function sendWhatsApp(){

let name=document.getElementById("name").value;

let mobile=document.getElementById("mobile").value;

let address=document.getElementById("address").value;

let gender=document.getElementById("gender").value;

let state=document.getElementById("state").value;

let order="";

cart.forEach(item=>{

order += item.name + " - ₹" + item.price + "%0A";

});

let total=document.getElementById("total").innerHTML;

/* APNA WHATSAPP NUMBER YAHA DALO */

let phone="919999999999";

let message=

"🛒 NEW ORDER %0A%0A" +

"Name: " + name + "%0A" +

"Mobile: " + mobile + "%0A" +

"Address: " + address + "%0A" +

"Gender: " + gender + "%0A" +

"State: " + state + "%0A%0A" +

"Products:%0A" + order +

"%0ATotal: ₹" + total;

window.open(

"https://wa.me/" + phone + "?text=" + message,

"_blank"

);

}

</script>

</body>
</html>
