<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies4Review</title>
<style>
body{font-family:Arial;background:#fff;color:#000;margin:0}
header{padding:20px;text-align:center;border-bottom:2px solid #000}
.search{display:flex;justify-content:center;padding:20px}
input{padding:12px;width:60%;border:2px solid #000}
button{padding:12px 20px;background:#000;color:#fff;border:none}
.movies{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:20px}
.card{width:220px;border:1px solid #000;padding:10px;cursor:pointer}
.card img{width:100%;height:300px;object-fit:cover}
#reviewPage{display:none;padding:20px}
</style>
</head>
<body>
<header><h1>Movies4Review</h1><p>Search and Read Honest Movie Reviews</p></header>
<div class='search'><input type='text' id='search' placeholder='Search movie...'><button onclick='searchMovie()'>Search</button></div>
<div class='movies' id='movieList'>
<div class='card' onclick="showReview('KGF 2','Amazing action packed movie with strong performances.')"><img src='images/kgf2.jpg'><h3>KGF 2</h3></div>
<div class='card' onclick="showReview('Pushpa 2','Stylish mass entertainer with solid screenplay.')"><img src='images/pushpa2.jpg'><h3>Pushpa 2</h3></div>
<div class='card' onclick="showReview('The Boys','Dark superhero satire with excellent twists.')"><img src='images/theboys.jpg'><h3>The Boys</h3></div>
</div>
<div id='reviewPage'>
<h2 id='movieTitle'></h2>
<p id='movieReview'></p>
<button onclick='goBack()'>Back</button>
</div>
<script>
function showReview(title,review){document.getElementById('movieList').style.display='none';document.getElementById('reviewPage').style.display='block';document.getElementById('movieTitle').innerText=title;document.getElementById('movieReview').innerText=review;}
function goBack(){document.getElementById('movieList').style.display='flex';document.getElementById('reviewPage').style.display='none';}
function searchMovie(){let input=document.getElementById('search').value.toLowerCase();let cards=document.querySelectorAll('.card');cards.forEach(card=>{card.style.display=card.innerText.toLowerCase().includes(input)?'block':'none';});}
</script>
</body>
</html>
