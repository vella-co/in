<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VELLA CO.</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#fff;color:#000;overflow-x:hidden}

/* HEADER */
header{
position:fixed;top:0;width:100%;
background:#fff;
border-bottom:1px solid #eee;
z-index:999;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 7%;
}

.logo{font-weight:900;font-size:28px;letter-spacing:3px}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:#000;
font-weight:600;
padding-left:6px;
position:relative;
}

.nav-links a::after{
content:"";
position:absolute;
bottom:-6px;
left:6px;
width:40%;
height:2px;
background:#ddd;
}

.search-box input{
padding:10px 16px;
border-radius:30px;
border:1px solid #ddd;
background:#f7f7f7;
outline:none;
}

.nav-icons{
display:flex;
gap:15px;
align-items:center;
font-size:20px;
cursor:pointer;
}

.cart-count{
background:#000;
color:#fff;
border-radius:50%;
font-size:11px;
padding:2px 6px;
position:absolute;
margin-left:-10px;
margin-top:-10px;
}

/* MOBILE MENU */
.menu-btn{display:none}

@media(max-width:768px){
.menu-btn{display:block}
.nav-links{
position:fixed;
top:70px;
left:-100%;
width:70%;
height:100vh;
background:#fff;
flex-direction:column;
padding:40px;
transition:.4s;
box-shadow:10px 0 40px rgba(0,0,0,.1);
}
.nav-links.active{left:0}
.search-box{display:none}
}

/* HERO */
.hero{
padding:130px 7% 60px;
display:flex;
justify-content:space-between;
align-items:center;
gap:40px;
}

.hero h1{font-size:70px;font-weight:900}

.hero img{
width:100%;
border-radius:20px;
height:500px;
object-fit:cover;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
padding:60px 7%;
}

.card{
border:1px solid #eee;
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.card:hover{transform:translateY(-8px)}

.card img{width:100%;height:300px;object-fit:cover}

.info{padding:15px}

.price{font-weight:800;font-size:20px}

.btns{
display:flex;
gap:10px;
margin-top:10px;
}

button{
padding:10px;
border:none;
cursor:pointer;
border-radius:10px;
font-weight:600;
}

.add{background:#000;color:#fff;flex:1}
.order{background:#f2f2f2;flex:1}

/* CART */
.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100vh;
background:#fff;
box-shadow:-10px 0 30px rgba(0,0,0,.1);
transition:.4s;
padding:20px;
z-index:9999;
}

.cart.active{right:0}

.item{
display:flex;
gap:10px;
margin-bottom:15px;
border-bottom:1px solid #eee;
padding-bottom:10px;
}

.delete{
color:red;
cursor:pointer;
}

/* CHECKOUT */
.checkout{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.checkout.active{display:flex}

.box{
background:#fff;
padding:25px;
width:400px;
border-radius:20px;
}

.box input,textarea,select{
width:100%;
margin:8px 0;
padding:10px;
border:1px solid #ddd;
border-radius:10px;
}

/* SOCIAL */
.socials{
display:flex;
gap:10px;
margin-top:10px;
}

.socials a{
width:35px;height:35px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
border:1px solid #ddd;
text-decoration:none;
color:#000;
}

</style>
</head>

<body>

<header>
<div class="navbar">

<div class="logo">VELLA CO.</div>

<div class="nav-links" id="menu">
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#">New</a>
<a href="#">Contact</a>
</div>

<div class="search-box">
<input placeholder="Search">
</div>

<div class="nav-icons">

<i class="fa fa-bars menu-btn" onclick="toggleMenu()"></i>

<div onclick="toggleCart()">
<i class="fa fa-shopping-bag"></i>
<span class="cart-count" id="count">0</span>
</div>

</div>

</div>
</header>

<section class="hero">
<div>
<h1>VELLA CO.</h1>
<p>Premium Streetwear Fashion</p>
</div>
<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b">
</section>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<button onclick="openCheckout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout" onclick="closeCheckout(event)">
<div class="box">
<h2>Checkout</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="10 digit mobile">
<input id="email" placeholder="Email">
<textarea id="address" placeholder="Address"></textarea>

<select id="pay">
<option value="online">Online</option>
<option value="cod">COD</option>
</select>

<button onclick="placeOrder()">Place Order</button>

</div>
</div>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

document.addEventListener("click",(e)=>{
if(!document.getElementById("menu").contains(e.target) &&
!e.target.classList.contains("menu-btn")){
document.getElementById("menu").classList.remove("active");
}
});

/* PRODUCTS */
let products=[
{ id:1,name:"Hoodie",price:1999,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{ id:2,name:"Tshirt",price:999,img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"},
{ id:3,name:"Jacket",price:2999,img:"https://images.unsplash.com/photo-1496747611176-843222e1e57c"}
];

let cart=[];

function show(){
let html="";
products.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<div class="btns">
<button class="add" onclick="add(${p.id})">Add</button>
<button class="order" onclick="buy(${p.id})">Order</button>
</div>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
show();

function add(id){
let p=products.find(x=>x.id==id);
cart.push(p);
document.getElementById("count").innerText=cart.length;
renderCart();
}

function renderCart(){
let html="";
cart.forEach((c,i)=>{
html+=`
<div class="item">
<p>${c.name}</p>
<span class="delete" onclick="del(${i})">X</span>
</div>`;
});
document.getElementById("cartItems").innerHTML=html;
}

function del(i){
cart.splice(i,1);
renderCart();
document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function buy(id){
toggleCheckout();
}

function openCheckout(){
toggleCheckout();
}

function toggleCheckout(){
document.getElementById("checkout").classList.toggle("active");
}

function closeCheckout(e){
if(e.target.id==="checkout") toggleCheckout();
}

function placeOrder(){

let phone=document.getElementById("phone").value;
if(phone.length!=10){
alert("Invalid number");
return;
}

if(document.getElementById("pay").value=="cod"){
window.open("https://wa.me/919999999999","_blank");
}else{
alert("Razorpay open (key add karna)");
}

}

</script>

</body>
</html>
