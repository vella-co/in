<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vella Co. Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    /* Premium Modern UI Setup */
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; color: #000000; }
    body { background: #fdfdfd; }
    
    header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
    .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; }

    /* Product Grid UI - Inspired by 10718.png */
    .products-grid { padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .product-card { 
        background: #ffffff; border: 1px solid #e0e0e0; border-radius: 16px; 
        padding: 12px; display: flex; flex-direction: column; 
    }
    .product-card img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 12px; }
    .product-name { font-size: 14px; font-weight: 600; margin-bottom: 15px; min-height: 40px; }
    .shop-btn { 
        width: 100%; padding: 12px; background: #000000; color: #ffffff; 
        border: none; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer;
    }

    /* Product Detail Page - Clean & Premium */
    #productPage { display: none; background: #fff; min-height: 100vh; padding: 20px; }
    .main-img { width: 100%; height: 350px; object-fit: contain; }
    .details-title { font-size: 22px; font-weight: 700; margin: 20px 0; }
    .price-tag { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .buy-now-btn { width: 100%; padding: 16px; background: #000000; color: #ffffff; font-weight: 700; border-radius: 12px; border: none; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>

<header>
    <div class="logo">VELLA CO.</div>
</header>

<div id="homePage">
    <div class="products-grid" id="mainProductsContainer"></div>
</div>

<script>
const products = [
    { id: 1, name: "Men White Solid Polo", price: "₹909", image: "https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=500" },
    { id: 2, name: "Men Black Printed Tee", price: "₹1,234", image: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" },
    { id: 3, name: "Men Maroon Crew Neck", price: "₹699", image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=500" },
    { id: 4, name: "Men Olive Polo", price: "₹974", image: "https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=500" }
];

function renderProducts() {
    const container = document.getElementById("mainProductsContainer");
    products.forEach(p => {
        container.innerHTML += `
            <div class="product-card">
                <img src="${p.image}">
                <div class="product-name">${p.name}</div>
                <button class="shop-btn" onclick="alert('Order for ${p.name}')">Shop Now</button>
            </div>
        `;
    });
}
renderProducts();
</script>
</body>
</html>
