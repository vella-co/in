<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELLA CO. - Premium Store</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
color:#000;
}

header{
position:sticky;
top:0;
background:#fff;
display:flex;
justify-content:space-between;
padding:15px 5%;
border-bottom:1px solid #eee;
z-index:999;
}

.logo{
font-size:22px;
font-weight:bold;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
padding:15px 5%;
}

select,input{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px 5%;
}

.card{
border:1px solid #eee;
padding:15px;
border-radius:12px;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.btn{
padding:10px;
border:none;
cursor:pointer;
margin-top:8px;
width:100%;
}

.cart{
position:fixed;
right:10px;
bottom:10px;
background:#000;
color:#fff;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
}

.section{
padding:40px 5%;
}

.faq-item{
border-bottom:1px solid #eee;
padding:10px 0;
cursor:pointer;
}

.answer{
display:none;
color:#555;
margin-top:5px;
}

.checkout{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#fff;
padding:20px;
width:90%;
max-width:500px;
border-radius:12px;
}

@media(max-width:900px){
.products{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
.products{grid-template-columns:1fr;}
}
</style>

</head>

<body>

<header>
<div class="logo">VELLA CO.</div>
<div onclick="openCart()" class="cart">Cart (<span id="cartCount">0</span>)</div>
</header>

<!-- FILTER -->
<div class="filters">
<input type="text" id="search" placeholder="Search product">

<select id="category">
<option value="all">All Category</option>
<option value="hoodie">Hoodie</option>
<option value="tshirt">T-Shirt</option>
<option value="jacket">Jacket</option>
</select>

<select id="sort">
<option value="">Sort</option>
<option value="low">Low to High</option>
<option value="high">High to Low</option>
</select>
</div>

<!-- PRODUCTS -->
<div class="products" id="productBox"></div>

<!-- PAGINATION -->
<div class="section">
<button onclick="pageChange(1)">1</button>
<button onclick="pageChange(2)">2</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
<div class="box">
<h2>Checkout</h2>
<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone (10 digit)" maxlength="10"><br><br>
<input id="address" placeholder="Address"><br><br>

<select id="payment">
<option value="online">Online (Razorpay)</option>
<option value="cod">Cash on Delivery</option>
</select><br><br>

<button onclick="placeOrder()" class="btn">Place Order</button>
</div>
</div>

<!-- FAQ -->
<div class="section">
<h2>FAQs</h2>

<div class="faq-item" onclick="toggleFAQ(this)">
What is delivery time?
<div class="answer">3-5 days delivery across India</div>
</div>

<div class="faq-item" onclick="toggleFAQ(this)">
Return policy?
<div class="answer">7 days easy return available</div>
</div>

<div class="faq-item" onclick="toggleFAQ(this)">
Payment methods?
<div class="answer">Razorpay UPI, Card & COD</div>
</div>

</div>

<!-- CONTACT -->
<div class="section" id="contact">
<h2>Contact</h2>
<p>Email: support@vellaco.com</p>
<p>Phone: +91 9999999999</p>
</div>

<script>

let products=[
{id:1,name:"Black Hoodie",price:2499,cat:"hoodie"},
{id:2,name:"White Hoodie",price:2299,cat:"hoodie"},
{id:3,name:"Street Tee",price:1299,cat:"tshirt"},
{id:4,name:"Premium Tee",price:1599,cat:"tshirt"},
{id:5,name:"Winter Jacket",price:3999,cat:"jacket"},
{id:6,name:"Denim Jacket",price:4599,cat:"jacket"},
{id:7,name:"Oversized Hoodie",price:2799,cat:"hoodie"},
{id:8,name:"Gym Tee",price:999,cat:"tshirt"},
{id:9,name:"Classic Jacket",price:4999,cat:"jacket"},
{id:10,name:"Urban Hoodie",price:2899,cat:"hoodie"},
{id:11,name:"Basic Tee",price:799,cat:"tshirt"},
{id:12,name:"Leather Jacket",price:5999,cat:"jacket"}
];

let page=1;
let cart=[];

function render(){

let box=document.getElementById("productBox");

let data=[...products];

// filter
let cat=document.getElementById("category").value;
let search=document.getElementById("search").value.toLowerCase();
let sort=document.getElementById("sort").value;

if(cat!="all") data=data.filter(p=>p.cat==cat);
if(search) data=data.filter(p=>p.name.toLowerCase().includes(search));

// sort
if(sort=="low") data.sort((a,b)=>a.price-b.price);
if(sort=="high") data.sort((a,b)=>b.price-a.price);

// pagination 6 items
let start=(page-1)*6;
let paged=data.slice(start,start+6);

box.innerHTML="";

paged.forEach(p=>{
box.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button class="btn" onclick="add(${p.id})">Add to Cart</button>
<button class="btn" onclick="buy(${p.id})">Buy Now</button>
</div>
`;
});

}

function pageChange(p){
page=p;
render();
}

function add(id){
cart.push(products.find(p=>p.id==id));
document.getElementById("cartCount").innerText=cart.length;
}

function openCart(){
document.getElementById("checkout").style.display="flex";
}

function buy(id){
cart=[products.find(p=>p.id==id)];
openCart();
}

function placeOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let payment=document.getElementById("payment").value;

if(phone.length!=10){
alert("Invalid phone number");
return;
}

let total=cart.reduce((a,b)=>a+b.price,0);

if(payment=="online"){
let options={
key:"YOUR_RAZORPAY_KEY",
amount:total*100,
currency:"INR",
name:"VELLA CO",
handler:function(){
alert("Payment Success");
}
};

new Razorpay(options).open();
}else{
alert("COD Order Placed Successfully");
}

document.getElementById("checkout").style.display="none";
cart=[];
document.getElementById("cartCount").innerText=0;
}

function toggleFAQ(el){
let ans=el.querySelector(".answer");
ans.style.display=ans.style.display=="block"?"none":"block";
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("category").addEventListener("change",render);
document.getElementById("sort").addEventListener("change",render);

render();

</script>

</body>
</html>
