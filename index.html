<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JapMala - Divine Naam Jap Counter</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--glass:rgba(255,255,255,.12);
--border:rgba(255,255,255,.20);
--shadow:0 20px 60px rgba(0,0,0,.20);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
overflow-x:hidden;
color:#fff;
background:linear-gradient(135deg,#ff9966,#ff5e62);
transition:.5s;
}

#particles{
position:fixed;
inset:0;
pointer-events:none;
opacity:.12;
background:
radial-gradient(circle at 10% 20%,white 2px,transparent 2px),
radial-gradient(circle at 80% 40%,white 2px,transparent 2px),
radial-gradient(circle at 30% 80%,white 2px,transparent 2px),
radial-gradient(circle at 70% 70%,white 2px,transparent 2px);
background-size:250px 250px;
animation:bgMove 25s linear infinite;
}

@keyframes bgMove{
from{transform:translateY(0);}
to{transform:translateY(-300px);}
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.logo{
font-size:28px;
font-weight:800;
}

.theme-btn{
border:none;
padding:12px 18px;
border-radius:15px;
background:var(--glass);
backdrop-filter:blur(15px);
color:#fff;
cursor:pointer;
}

.container{
width:min(95%,700px);
margin:auto;
padding-bottom:50px;
}

.glass{
background:var(--glass);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:30px;
box-shadow:var(--shadow);
}

.hero{
padding:30px;
text-align:center;
margin-bottom:20px;
}

.god-icon{
font-size:80px;
margin-bottom:10px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

.god-title{
font-size:34px;
font-weight:700;
}

.god-sub{
margin-top:8px;
opacity:.9;
}

.selector{
padding:22px;
margin-bottom:20px;
}

.selector label{
display:block;
margin-bottom:10px;
font-weight:600;
}

.selector select{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:16px;
font-size:16px;
}
 .counter-card{
padding:30px;
text-align:center;
margin-bottom:20px;
}

.counter-label{
font-size:18px;
opacity:.9;
}

.counter{
font-size:80px;
font-weight:800;
margin:15px 0;
text-shadow:0 0 25px rgba(255,255,255,.4);
}

.count-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:700;
cursor:pointer;
background:white;
color:#111;
transition:.25s;
}

.count-btn:hover{
transform:scale(1.03);
}

.count-btn:active{
transform:scale(.95);
}

.target-card{
padding:25px;
margin-bottom:20px;
}

.target-row{
display:flex;
gap:10px;
align-items:center;
justify-content:space-between;
margin-bottom:15px;
}

.target-row select{
padding:12px;
border:none;
border-radius:14px;
}

#customTarget{
width:100%;
padding:14px;
border:none;
border-radius:14px;
display:none;
margin-bottom:15px;
}

.progress-track{
height:18px;
background:rgba(255,255,255,.15);
border-radius:50px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
border-radius:50px;
background:linear-gradient(90deg,#ffe259,#ffa751);
transition:.4s;
}

.progress-text{
margin-top:10px;
text-align:center;
font-weight:600;
}

.actions{
display:flex;
gap:12px;
margin-bottom:20px;
}

.actions button{
flex:1;
padding:16px;
border:none;
border-radius:16px;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.minus-btn{
background:#fff;
}

.reset-btn{
background:#ffe259;
}

.plus-btn{
background:#fff;
}

.quote-card{
padding:25px;
text-align:center;
font-size:18px;
font-weight:600;
line-height:1.7;
margin-bottom:20px;
}

.footer{
text-align:center;
padding:25px;
opacity:.85;
}

.theme-radha{
background:linear-gradient(135deg,#ff9966,#ff5e62);
}

.theme-ram{
background:linear-gradient(135deg,#ff8008,#ffc837);
}

.theme-shiv{
background:linear-gradient(135deg,#141e30,#243b55);
}

.theme-hanuman{
background:linear-gradient(135deg,#ff512f,#dd2476);
}

.theme-ganesh{
background:linear-gradient(135deg,#f7971e,#ffd200);
}

.theme-sai{
background:linear-gradient(135deg,#c79081,#dfa579);
}

.theme-durga{
background:linear-gradient(135deg,#cb2d3e,#ef473a);
}

.theme-krishna{
background:linear-gradient(135deg,#396afc,#2948ff);
}

@media(max-width:600px){

.counter{
font-size:58px;
}

.god-title{
font-size:26px;
}

.god-icon{
font-size:60px;
}

.actions{
flex-direction:column;
}

}

</style>

</head>

<body class="theme-radha">

<div id="particles"></div>

<header class="topbar">

<div class="logo">
📿 JapMala
</div>

<button class="theme-btn">
✨ Divine
</button>

</header>

<div class="container">

<div class="hero glass">

<div class="god-icon" id="godIcon">
🌸
</div>

<div class="god-title" id="godTitle">
Radha Krishna
</div>

<div class="god-sub">
Har Naam Mein Shakti Hai
</div>

</div>

<div class="selector glass">

<label>
Select Naam
</label>

<select id="godSelect">

<option value="radha">🌸 Radha Krishna</option>
<option value="ram">🏹 Shri Ram</option>
<option value="shiv">🔱 Mahadev</option>
<option value="hanuman">🚩 Hanuman Ji</option>
<option value="ganesh">🐘 Ganesh Ji</option>
<option value="sai">🙏 Sai Baba</option>
<option value="durga">🦁 Maa Durga</option>
<option value="krishna">🦚 Krishna</option>

</select>

</div>

<div class="counter-card glass">

<div class="counter-label">
Jap Count
</div>

<div id="counter" class="counter">
0
</div>

<button id="countBtn" class="count-btn">
📿 TAP TO CHANT
</button>

</div>
<div class="target-card glass">

<div class="target-row">

<h3>🎯 Target</h3>

<select id="targetSelect">
<option value="108">108</option>
<option value="1008">1008</option>
<option value="11000">11000</option>
<option value="custom">Custom</option>
</select>

</div>

<input
type="number"
id="customTarget"
placeholder="Enter Custom Target">

<div class="progress-track">
<div id="progressFill" class="progress-fill"></div>
</div>

<div id="progressText" class="progress-text">
0 / 108
</div>

</div>

<div class="actions">

<button id="minusBtn" class="minus-btn">
➖
</button>

<button id="resetBtn" class="reset-btn">
🔄 Reset
</button>

<button id="plusBtn" class="plus-btn">
➕
</button>

</div>

<div class="quote-card glass">

<div id="quoteText">
🌸 Naam Jap Se Mann Shuddh Hota Hai 🌸
</div>

</div>

<div class="footer">
📿 JapMala • Phase 1 Premium
</div>

</div>

<script>

let count =
parseInt(localStorage.getItem("jap_count")) || 0;

let target =
parseInt(localStorage.getItem("jap_target")) || 108;

const counter =
document.getElementById("counter");

const progressFill =
document.getElementById("progressFill");

const progressText =
document.getElementById("progressText");

const targetSelect =
document.getElementById("targetSelect");

const customTarget =
document.getElementById("customTarget");

function updateUI(){

counter.innerText = count;

let percent =
Math.min((count/target)*100,100);

progressFill.style.width =
percent + "%";

progressText.innerText =
count + " / " + target;

localStorage.setItem(
"jap_count",
count
);

localStorage.setItem(
"jap_target",
target
);

}

updateUI();

document
.getElementById("countBtn")
.addEventListener("click",()=>{

count++;
updateUI();

if(navigator.vibrate){
navigator.vibrate(30);
}

});

document
.getElementById("plusBtn")
.addEventListener("click",()=>{

count++;
updateUI();

});

document
.getElementById("minusBtn")
.addEventListener("click",()=>{

if(count>0){
count--;
updateUI();
}

});

document
.getElementById("resetBtn")
.addEventListener("click",()=>{

if(confirm("Reset Jap Count?")){

count=0;
updateUI();

}

});

targetSelect.addEventListener(
"change",
function(){

if(this.value==="custom"){

customTarget.style.display=
"block";

}else{

customTarget.style.display=
"none";

target=
parseInt(this.value);

updateUI();

}

}
);

customTarget.addEventListener(
"input",
function(){

if(this.value){

target=
parseInt(this.value);

updateUI();

}

}
);

const themes = {

radha:{
class:"theme-radha",
icon:"🌸",
title:"Radha Krishna"
},

ram:{
class:"theme-ram",
icon:"🏹",
title:"Shri Ram"
},

shiv:{
class:"theme-shiv",
icon:"🔱",
title:"Mahadev"
},

hanuman:{
class:"theme-hanuman",
icon:"🚩",
title:"Hanuman Ji"
},

ganesh:{
class:"theme-ganesh",
icon:"🐘",
title:"Ganesh Ji"
},

sai:{
class:"theme-sai",
icon:"🙏",
title:"Sai Baba"
},

durga:{
class:"theme-durga",
icon:"🦁",
title:"Maa Durga"
},

krishna:{
class:"theme-krishna",
icon:"🦚",
title:"Krishna"
}

};

document
.getElementById("godSelect")
.addEventListener(
"change",
function(){

let g =
themes[this.value];

document.body.className =
g.class;

document
.getElementById("godIcon")
.innerText =
g.icon;

document
.getElementById("godTitle")
.innerText =
g.title;

}
);

</script>

</body>
</html>
