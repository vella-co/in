<!DOCTYPE html>
<html>
<head>
<title>AGE GURU</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:50px;
}
.card{
max-width:500px;
margin:auto;
padding:20px;
background:#1e293b;
border-radius:15px;
}
input,button{
padding:10px;
margin:10px;
width:90%;
}
button{
background:#6366f1;
color:white;
border:none;
}
</style>
</head>
<body>

<div class="card">
<h1>AGE GURU</h1>

<input type="date" id="dob">

<button onclick="calcAge()">Calculate Age</button>

<h2 id="result"></h2>
</div>

<script>
function calcAge(){
let dob=new Date(document.getElementById("dob").value);
let today=new Date();
let age=today.getFullYear()-dob.getFullYear();

if(
today.getMonth()<dob.getMonth() ||
(today.getMonth()==dob.getMonth() &&
today.getDate()<dob.getDate())
){
age--;
}

document.getElementById("result").innerHTML=
"Your Age: "+age+" Years";
}
</script>

</body>
</html>
