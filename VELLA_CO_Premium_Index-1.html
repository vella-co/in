<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELLA CO. Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#fff;color:#111}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;padding:18px 5%;display:flex;justify-content:space-between}
.logo{font-size:28px;font-weight:700}
.hero{min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
.hero h1{font-size:60px}
.hero p{margin:15px 0;color:#666}
.btn{background:#111;color:#fff;padding:14px 24px;border-radius:10px;text-decoration:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px 5%}
.card{border:1px solid #eee;border-radius:20px;padding:20px;transition:.3s}
.card:hover{transform:translateY(-6px)}
footer{padding:40px;text-align:center;border-top:1px solid #eee}
</style>
</head>
<body>
<header><div class="logo">VELLA CO.</div><div>Premium Fashion Store</div></header>
<section class="hero">
<div>
<h1>VELLA CO.</h1>
<p>Minimal Streetwear Collection</p>
<a class="btn" href="#shop">Shop Now</a>
</div>
</section>
<section id="shop" class="grid">
<div class="card"><h3>Oversized Hoodie</h3><p>₹2499</p></div>
<div class="card"><h3>Premium Tee</h3><p>₹1499</p></div>
<div class="card"><h3>Luxury Jacket</h3><p>₹3999</p></div>
<div class="card"><h3>Streetwear Cargo</h3><p>₹2999</p></div>
</section>
<footer>© 2026 VELLA CO.</footer>
</body>
</html>
